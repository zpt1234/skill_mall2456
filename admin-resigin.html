<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员注册</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card">
                    <div class="card-header bg-success text-white text-center">
                        <h4>秒杀系统 - 管理员注册</h4>
                    </div>
                    <div class="card-body">
                        <form id="regForm">
                            <div class="mb-3">
                                <label class="form-label">账号</label>
                                <input type="text" id="username" class="form-control" placeholder="请输入账号" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">密码</label>
                                <input type="password" id="password" class="form-control" placeholder="请输入密码" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">手机号</label>
                                <input type="text" id="phone" class="form-control" placeholder="请输入手机号" required>
                            </div>
                            <button type="submit" class="btn btn-success w-100">注册</button>
                            <div class="text-center mt-3">
                                <a href="admin-login.html">已有账号？去登录</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

<!-- 引入工具类 -->
<script src="SeckillUtil.js"></script>
<script>
// 注册表单提交
document.getElementById('regForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    // 获取表单值
    const params = {
        username: document.getElementById('username').value.trim(),
        password: document.getElementById('password').value.trim(),
        phone: document.getElementById('phone').value.trim()
    };

    // 前端校验
    if (!params.username) return alert("请输入账号！");
    if (params.password.length < 6) return alert("密码长度不能少于6位！");
    if (!/^1[3-9]\d{9}$/.test(params.phone)) return alert("请输入正确的手机号！");

    try {
        // 调用工具类请求注册接口
        await SeckillUtil.request("/admin/register", "POST", params);
        alert('注册成功！即将跳转到登录页');
        window.location.href = "admin-login.html";
    } catch (err) {
        // 错误由工具类统一提示
    }
});
</script>
</body>
</html>
